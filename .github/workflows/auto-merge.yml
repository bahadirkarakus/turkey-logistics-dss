name: Auto-merge on CI pass

on:
  workflow_run:
    workflows: [CI]
    types: [completed]

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    name: Merge PR if CI passed
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success'

    steps:
      - name: Find open PR for this branch
        id: find-pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BRANCH: ${{ github.event.workflow_run.head_branch }}
          REPO: ${{ github.repository }}
        run: |
          PR=$(gh pr list \
            --repo "$REPO" \
            --head "$BRANCH" \
            --base main \
            --state open \
            --json number \
            --jq '.[0].number // empty')

          if [ -z "$PR" ]; then
            echo "No open PR found for branch $BRANCH — skipping."
            echo "pr_number=" >> "$GITHUB_OUTPUT"
          else
            echo "Found PR #$PR for branch $BRANCH"
            echo "pr_number=$PR" >> "$GITHUB_OUTPUT"
          fi

      - name: Squash-merge PR
        if: steps.find-pr.outputs.pr_number != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          PR: ${{ steps.find-pr.outputs.pr_number }}
        run: |
          gh pr merge "$PR" \
            --repo "$REPO" \
            --squash \
            --delete-branch \
            --admin
          echo "PR #$PR merged and branch deleted."
